# orchestrators/flow.author-capability.yaml
#
# Author a brand-new capability from a goal description + the
# operator's available tooling. Smallest of the four meta-flows;
# good entry point for operators new to the shape.

workflows:
  flow.author-capability:
    description: |
      Author a new praxec capability (a cap.* YAML). The canonical way to author
      a capability in praxec — use this instead of hand-writing capability YAML.
      Survey reachable tooling → propose 2-3 capability shapes → operator picks
      one → emit the capability definition YAML → write it to its target pack
      path → check-config (the gate loads the new artifact) → adversarial
      review, looping back to compose with the findings on
      needs-revision/rejected (bounded) → PR.
    inputs:
      goal:      { type: string, required: true }
      namespace: { type: string, default: "draft" }
      base_ref:  { type: string, default: main }
      # Bound on review-driven repair rounds before giving up (LoopGuard).
      max_repair_rounds: { type: integer, default: 2 }
      # Round counter — do not set; the loop increments it.
      repair_round:      { type: integer, default: 0 }
      # Review findings fed back into composing on a repair round — do
      # not set; the reviewing state writes it (schema matches that
      # writer — V14 slot-type unification).
      review_findings:   { type: array }
      # Gateway config whose `repos:` load the directory the emitted
      # definition is saved into — `praxec check` needs the parent
      # context, not the bare emitted file. Defaults to the resolver's
      # cwd `praxec.yaml`.
      gateway_config_path: { type: string, default: "praxec.yaml" }
    initialState: surveying_tools
    states:
      surveying_tools:
        transitions:
          survey:
            target: composing
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.research.tool-inventory
              use:
                # No inputs: the survey is a deterministic gateway self-survey
                # (cap.research.tool-inventory declares no inputs). A `filter`
                # binding here would be dead — V30 rejects it.
                outputs:
                  "$.context.inventory": inventory

      composing:
        transitions:
          compose:
            target: picking_shape
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.plan.compose-implementation
              use:
                inputs:
                  goal:            "$.context.goal"
                  inventory:       "$.context.inventory"
                  # Empty on the first pass; carries the adversarial
                  # review's findings on a repair round (finding #5).
                  review_findings: "$.context.review_findings"
                outputs:
                  "$.context.candidates": candidates

      picking_shape:
        transitions:
          pick:
            target: emitting
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.gate.human-pick-shape
              use:
                inputs:
                  candidates: "$.context.candidates"
                  prompt:     "Pick capability shape"
                outputs:
                  "$.context.chosen":              chosen
                  "$.context.shape_rationale":    rationale

      emitting:
        transitions:
          emit:
            target: writing
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.implement.emit-yaml
              use:
                inputs:
                  chosen:    "$.context.chosen"
                  # Literal tier discriminator — the emit cap's `kind`
                  # snippet input is a closed enum [capability, orchestrator],
                  # NOT the free-text goal. Passing the goal here would fail
                  # the child's snippet-input enum validation.
                  kind:      capability
                  namespace: "$.context.namespace"
                outputs:
                  "$.context.yaml_text":   yaml_text
                  "$.context.target_path": target_path

      # finding #4: the emitted YAML must reach disk BEFORE the check
      # gate runs — otherwise `praxec check` validates the UNCHANGED
      # gateway and the "it must load" gate is vacuous.
      writing:
        transitions:
          write:
            target: written
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.install.emitted-definition
              use:
                inputs:
                  yaml_text:   "$.context.yaml_text"
                  target_path: "$.context.target_path"
                outputs:
                  "$.context.written_path": written_path
                  "$.context.write_ok":     write_ok

      written:
        transitions:
          advance:
            target: checking
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.write_ok == true"
          abort:
            target: failed
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.write_ok == false"

      checking:
        transitions:
          check:
            target: checked
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.verify.check-config
              use:
                inputs:
                  gateway_config_path: "$.context.gateway_config_path"
                outputs:
                  "$.context.check_ok":          ok
                  "$.context.check_diagnostics": diagnostics

      checked:
        transitions:
          advance:
            target: reviewing
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.check_ok == true"
          abort:
            target: failed
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.check_ok == false"

      reviewing:
        transitions:
          review:
            target: reviewed
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.review.adversarial
              use:
                inputs:
                  diff_against: "$.context.base_ref"
                outputs:
                  "$.context.review_verdict":  verdict
                  "$.context.review_findings": findings

      reviewed:
        transitions:
          advance:
            target: opening_pr
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.review_verdict == 'approved'"
          # finding #5: a non-approved verdict routes BACK to composing —
          # with the review findings already in $.context.review_findings,
          # which the compose transition feeds to the composer — instead
          # of discarding the composed work. Bounded by repair_round
          # (LoopGuard, same discipline as flow.repair-workflow-health).
          repair_needs_revision:
            target: composing
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.review_verdict == 'needs-revision'"
              - kind: expr
                expr: "$.context.repair_round < $.context.max_repair_rounds"
            output:
              repair_round: { add: ["$.context.repair_round", 1] }
          repair_rejected:
            target: composing
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.review_verdict == 'rejected'"
              - kind: expr
                expr: "$.context.repair_round < $.context.max_repair_rounds"
            output:
              repair_round: { add: ["$.context.repair_round", 1] }
          # Repair budget exhausted -> explicit failure (never loop forever).
          abort_needs_revision:
            target: failed
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.review_verdict == 'needs-revision'"
              - kind: expr
                expr: "$.context.repair_round >= $.context.max_repair_rounds"
          abort_rejected:
            target: failed
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.review_verdict == 'rejected'"
              - kind: expr
                expr: "$.context.repair_round >= $.context.max_repair_rounds"
          # praxec-check: out-of-domain review_verdict must not fall through to
          # recovery links — route it to the explicit error state (unguarded default).
          default:
            target: failed
            actor: deterministic

      opening_pr:
        transitions:
          open:
            target: done
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.coordinate.pr-open
              use:
                inputs:
                  title: "$.context.goal"
                  body:  "$.context.goal"
                  base:  "$.context.base_ref"
                outputs:
                  "$.context.pr_url":    url
                  "$.context.pr_number": pr_number

      done:
        terminal: true

      failed:
        terminal: true
