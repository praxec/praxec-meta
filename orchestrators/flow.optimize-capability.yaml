# orchestrators/flow.optimize-capability.yaml
#
# Refine an existing capability based on its audit history +
# adversarial review. Swaps the tool-survey front step for an
# audit-mine — past behaviour informs what improvements make sense.

workflows:
  flow.optimize-capability:
    description: |
      Mine an existing capability's audit history → propose 2-3
      refinement shapes → operator picks one → emit improved YAML →
      check-config → adversarial review → PR.
    inputs:
      target_definition_id: { type: string, required: true }
      since:                { type: string, default: "" }
      base_ref:             { type: string, default: main }
      # Gateway config `praxec check` runs against — needs the parent
      # context, not the bare emitted file. Defaults to cwd praxec.yaml.
      gateway_config_path:  { type: string, default: "praxec.yaml" }
    initialState: mining_audit
    states:
      mining_audit:
        transitions:
          mine:
            target: composing
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.audit.mine-transitions
              use:
                inputs:
                  definition_id: "$.context.target_definition_id"
                  since:         "$.context.since"
                outputs:
                  "$.context.audit_report": report

      composing:
        transitions:
          compose:
            target: picking_shape
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.plan.compose-implementation
              use:
                inputs:
                  goal:      "$.context.target_definition_id"
                  inventory: "$.context.audit_report"
                outputs:
                  "$.context.candidates": candidates

      picking_shape:
        transitions:
          pick:
            target: emitting
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.gate.human-pick-shape
              use:
                inputs:
                  candidates: "$.context.candidates"
                  prompt:     "Pick the refinement to apply"
                outputs:
                  "$.context.chosen":          chosen
                  "$.context.shape_rationale": rationale

      emitting:
        transitions:
          emit:
            target: checking
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.implement.emit-yaml
              use:
                inputs:
                  chosen:    "$.context.chosen"
                  # Literal tier discriminator — emit's `kind` snippet input
                  # is a closed enum [capability, orchestrator], not an id.
                  kind:      capability
                  namespace: "$.context.target_definition_id"
                outputs:
                  "$.context.yaml_text":   yaml_text
                  "$.context.target_path": target_path

      checking:
        transitions:
          check:
            target: checked
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.verify.check-config
              use:
                inputs:
                  gateway_config_path: "$.context.gateway_config_path"
                outputs:
                  "$.context.check_ok":          ok
                  "$.context.check_diagnostics": diagnostics

      checked:
        transitions:
          advance:
            target: reviewing
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.check_ok == true"
          abort:
            target: failed
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.check_ok == false"

      reviewing:
        transitions:
          review:
            target: reviewed
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.review.adversarial
              use:
                inputs:
                  diff_against: "$.context.base_ref"
                outputs:
                  "$.context.review_verdict":  verdict
                  "$.context.review_findings": findings

      reviewed:
        transitions:
          advance:
            target: opening_pr
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.review_verdict == 'approved'"
          abort:
            target: failed
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.review_verdict == 'rejected'"
          # praxec-check: out-of-domain review_verdict must not fall through to
          # recovery links — route it to the explicit error state (unguarded default).
          default:
            target: failed
            actor: deterministic

      opening_pr:
        transitions:
          open:
            target: done
            actor: deterministic
            executor:
              kind: workflow
              definitionId: cap.coordinate.pr-open
              use:
                inputs:
                  title: "$.context.target_definition_id"
                  body:  "$.context.target_definition_id"
                  base:  "$.context.base_ref"
                outputs:
                  "$.context.pr_url":    url
                  "$.context.pr_number": pr_number

      done:
        terminal: true

      failed:
        terminal: true
