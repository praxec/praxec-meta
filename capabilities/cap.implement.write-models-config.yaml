# capabilities/cap.implement.write-models-config.yaml
#
# Atomic write of `models.yaml` + round-trip validation through the
# same loader the resolver uses at workflow start (FMECA U3/U6).
#
# The cap's script:
#   1. Writes the YAML to a temp file in the SAME directory as the
#      target (cross-fs renames are not atomic).
#   2. Invokes `px validate-agents-config <tmp>` — a real round-trip
#      through `ModelsFile::from_path`, the same code path the
#      resolver uses. (The CLI subcommand still carries its legacy
#      `validate-agents-config` name on the `px` binary; its help
#      text documents it as `validate-models-config`.)
#   3. On pass: atomic rename → target. On fail: rolls back the
#      temp file so a broken config never replaces a good one.

workflows:
  cap.implement.write-models-config:
    verb: implement
    lifecycle: experimental
    description: >
      Render the approved plan into `models.yaml`, atomic-write
      (temp + rename), and round-trip-validate via
      `px validate-agents-config`. round_trip_ok=false rolls
      back; the orchestrator branches to `failed`.
    snippet:
      inputs:
        plan_final:  { type: object, required: true }
        target_path:
          type: string
          default: ".praxec/models.yaml"
      outputs:
        yaml_text:     { type: string }
        written_path:  { type: string }
        round_trip_ok: { type: boolean }
        validation:    { type: object }
    skills: [implement.emit-praxec-yaml]
    initialState: rendering
    states:
      rendering:
        goal: >
          Serialize plan_final to YAML text following the models.yaml
          schema (version / strict_specificity / default / overrides).
          The emit-praxec-yaml skill's discipline applies: contract
          conformance, no anonymous shadowing, strict over-deny on
          unknown fields.
        transitions:
          submit_yaml:
            target: writing
            actor: agent
            inputSchema:
              type: object
              required: [yaml_text]
              properties:
                yaml_text: { type: string }
            executor: { kind: noop }
            output:
              yaml_text: "$.arguments.yaml_text"
      writing:
        transitions:
          write:
            target: done
            actor: deterministic
            executor:
              kind: script
              subject: install.models-config
              args:
                - "$.context.yaml_text"
                - "$.workflow.input.target_path"
              treatNonZeroAsFailure: false
            output:
              written_path:  "$.output.json.written_path"
              round_trip_ok: "$.output.json.round_trip_ok"
              validation:    "$.output.json.validation"
      done: { terminal: true }
