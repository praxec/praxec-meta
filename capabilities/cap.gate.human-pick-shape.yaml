# capabilities/cap.gate.human-pick-shape.yaml
#
# Carries the E1-E3 elicitation contract: the operator picks by
# `chosen_id` (a titled single-select over the candidates), and the
# `pick` output operator re-derives the FULL candidate object into
# `chosen` — callers' `chosen: object` contract is unchanged.

workflows:
  cap.gate.human-pick-shape:
    verb: gate
    lifecycle: experimental
    description: >
      Block while the operator picks one of the candidate
      implementation shapes from the compose step.
    snippet:
      inputs:
        candidates: { type: array,  required: true }
        prompt:     { type: string, default: "Pick the shape you want to implement" }
      outputs:
        chosen:    { type: object }
        rationale: { type: string }
    initialState: awaiting_human
    states:
      awaiting_human:
        goal: Surface the candidate list + prompt; wait for the operator's pick.
        transitions:
          pick:
            target: done
            actor: human
            presents: ["$.context.candidates"]
            choices:
              field: chosen_id
              from: "$.context.candidates"
              value: "id"
              title: "name"
            inputSchema:
              type: object
              required: [chosen_id]
              properties:
                chosen_id: { type: string }
                rationale: { type: string, default: "" }
            executor: { kind: human }
            output:
              chosen:
                pick:
                  from: "$.context.candidates"
                  by: "id"
                  eq: "$.arguments.chosen_id"
              rationale: "$.arguments.rationale"
      done: { terminal: true }
