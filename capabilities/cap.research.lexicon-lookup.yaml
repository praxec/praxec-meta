# capabilities/cap.research.lexicon-lookup.yaml
#
# Typed wrapper over the gateway's read tool `praxec.query`. A lexicon
# lookup is dispatched by present-field shape:
#   praxec.query { subject: "lexicon:<term>" } → describe the term.
# Operators wire a connection that surfaces the in-process gateway as
# an MCP server (`gateway_self`); this repo ships no connection of its
# own (see praxec.repo.yaml), so the operator declares `gateway_self`
# in their gateway config.

workflows:
  cap.research.lexicon-lookup:
    verb: research
    lifecycle: experimental
    description: >
      Look up a term in the gateway's lexicon overlay; emit definition
      + governance metadata. Thin contract over `praxec.query` with a
      `subject: "lexicon:<term>"` shape.
    snippet:
      inputs:
        # Fully-qualified describe subject, e.g. `lexicon:verdict`.
        subject: { type: string, required: true }
      outputs:
        entry: { type: object }
    initialState: ready
    states:
      ready:
        transitions:
          lookup:
            target: done
            actor: deterministic
            executor:
              kind: mcp
              connection: gateway_self
              tool: praxec.query
              map:
                subject: "$.context.subject"
            output:
              entry: "$.output"
      done: { terminal: true }
