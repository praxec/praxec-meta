# capabilities/cap.summarize.lexicon-define.yaml
#
# Register a new term in the gateway's lexicon overlay. Thin wrapper
# over the gateway's write tool `praxec.command`, which dispatches a
# define by present-field shape:
#   praxec.command { subject: "lexicon:<term>", definition: {...} }
# Requires lexicon writes to be enabled on the gateway (SPEC §32).

workflows:
  cap.summarize.lexicon-define:
    verb: summarize
    lifecycle: experimental
    description: >
      Register a new term in the gateway's lexicon overlay. Thin
      wrapper over `praxec.command` with a
      `subject: "lexicon:<term>"` + `definition` shape.
    snippet:
      inputs:
        # Fully-qualified define subject, e.g. `lexicon:verdict`.
        subject: { type: string, required: true }
        # Define payload — { definition_short, governance?, ... }.
        definition: { type: object, required: true }
      outputs:
        registered: { type: object }
    skills: [summarize.lexicon-extend]
    initialState: ready
    states:
      ready:
        transitions:
          define:
            target: done
            actor: deterministic
            executor:
              kind: mcp
              connection: gateway_self
              tool: praxec.command
              map:
                subject:    "$.context.subject"
                definition: "$.context.definition"
            output:
              registered: "$.output"
      done: { terminal: true }
