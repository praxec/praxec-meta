# capabilities/cap.gate.human-approve-plan.yaml
#
# HITL gate over the suggested binding plan. Two modes:
#
#   - `auto`         — skip the human; plan_final = plan; approved = true.
#   - `review_plan`  — block for the operator's decision (approve or
#                      reject). `plan_final` is always the presented
#                      plan from context — the gate decides, it does
#                      not edit (an elicitation form can only collect
#                      primitives; hand-back-an-edited-plan was the
#                      "Accept can never succeed" defect shape).
#
# `review_each` (per-binding approval) is explicitly deferred to
# v0.3.1+ per the FMECA P4 split.

workflows:
  cap.gate.human-approve-plan:
    verb: gate
    lifecycle: experimental
    description: >
      Decide whether to write the suggested agents.yaml plan.
      `auto` mode short-circuits with approved=true; `review_plan`
      blocks until the operator submits an approval or a rejection.
      The chosen plan_final flows on to the write cap.
    # Inputs are declared in BOTH homes, kept in sync: top-level `inputs:`
    # synthesizes the inputSchema (so `mode`/`prompt` defaults are actually
    # applied at start and every input is a statically-seeded `$.context`
    # slot the mode guards may read — use-before-def, SPEC §11), while
    # `snippet.inputs` carries the V30 caller-binding contract (V4 requires
    # the key on a capability snippet).
    inputs: &approve_plan_inputs
      plan:        { type: object, required: true }
      rationale:   { type: object, default: {} }
      tradeoffs:   { type: array,  default: [] }
      assumptions: { type: array,  default: [] }
      mode:
        type: string
        enum: [auto, review_plan]
        default: review_plan
      prompt:
        type: string
        default: "Approve this agents.yaml plan?"
    snippet:
      inputs: *approve_plan_inputs
      outputs:
        approved:   { type: boolean }
        plan_final: { type: object }
        rationale:  { type: string }
    initialState: awaiting_human
    states:
      awaiting_human:
        goal: >
          Surface the plan + rationale + tradeoffs + assumptions to
          the operator; wait for approve / reject. In `auto` mode
          the deterministic short-circuit fires before any human
          parks.
        transitions:
          auto_approve:
            target: done
            actor: deterministic
            guards:
              - kind: expr
                expr: "$.context.mode == 'auto'"
            executor: { kind: noop }
            output:
              approved:   true
              plan_final: "$.context.plan"
              rationale:  "auto mode — no human review"
          approve:
            target: done
            actor: human
            guards:
              - kind: expr
                expr: "$.context.mode == 'review_plan'"
            presents: ["$.context.plan"]
            inputSchema:
              type: object
              required: [approved]
              properties:
                approved:  { type: boolean }
                rationale: { type: string, default: "" }
            executor: { kind: human }
            output:
              approved:   "$.arguments.approved"
              plan_final: "$.context.plan"
              rationale:  "$.arguments.rationale"
      done: { terminal: true }
