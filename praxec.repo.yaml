schema: praxec.repo/v1
name: praxec-meta
namespace: meta
version: 0.3.0
description: |
  Meta-authoring workflows for praxec 0.0.14+: capabilities and
  flows whose job is to author or optimize other capabilities and
  flows.

  Operators load this repo alongside cognitive-architectures (or any
  other resource repo) to get a self-bootstrapping authoring loop:

      repos:
        - path: /repos/cognitive-architectures
        - path: /repos/praxec-meta

  Loaded ids land under `meta/<id>` — e.g. `meta/flow.author-capability`,
  `meta/cap.research.tool-inventory`.

  The meta flows:
    - meta/flow.author-capability
    - meta/flow.author-flow
    - meta/flow.optimize-capability
    - meta/flow.optimize-flow
    - meta/flow.configure-models       (models.yaml setup)

  The first four share a small cap stack: tool-inventory (introspect
  what's reachable), compose-implementation (propose shapes),
  emit-yaml (generate snippet-contract-compliant YAML), check-config
  (run `praxec check` on the operator's gateway config),
  audit-mine-transitions (for the optimize variants), plus thin typed
  wrappers over the gateway's two-tool surface (`praxec.query` /
  `praxec.command`) for lexicon lookup/define so authored content
  stays vocabulary-consistent.

  `flow.configure-models` adds five caps for the LLM-binding setup
  flow: research.model-inventory, plan.suggest-bindings,
  gate.human-approve-plan, implement.write-models-config,
  verify.auth-only-smoke-test. It writes the canonical
  `.praxec/models.yaml` (`gateway.models_yaml`) the resolver reads
  for `kind: agent` and affinity-resolved `kind: llm` steps.

layout:
  capabilities:  capabilities
  # Engine layout field is `flows`; the directory remains `orchestrators/`.
  flows:         orchestrators
  skills:        skills
  scripts:       scripts-library
  # Operators wire their own MCP connections (gateway_self,
  # github_mcp, etc.) in the gateway config; this repo ships no
  # connection definitions of its own at v0.1.
  connections:   ._unused_v01_connections
