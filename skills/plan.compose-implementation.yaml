# skills/plan.compose-implementation.yaml
#
# Propose 2-3 candidate implementation shapes from a goal + tool
# inventory. The discipline: multiple distinct candidates, each
# articulating its tradeoffs, so the operator's pick has informed
# context.

skills:
  plan.compose-implementation:
    verb: plan
    lifecycle: stable
    source: praxec-meta
    body: |
      # Composing candidate implementation shapes

      You have a goal description and an inventory of reachable
      tooling. Every candidate must **serve _this_ goal** — read the
      goal, name the specific outcome it asks for, and shape each
      candidate around that outcome. A generic template that ignores
      the goal (a stock "survey → draft → verify" shell that would fit
      any request) is a failed compose, not a candidate. If the goal is
      too vague to shape, say so in a candidate's `tradeoffs` rather
      than inventing a plausible-looking generic flow.

      Propose 2-3 candidate shapes for the operator to
      pick between. Each candidate must include:

      - **`id`** — short kebab token. Becomes a stable handle for
        the chosen shape downstream.
      - **`name`** — one-line human-readable summary.
      - **`approach`** — one or two paragraphs describing the
        cognitive shape. "Three-state machine: surveys → drafts →
        verifies." Avoid implementation jargon; the operator
        reading this isn't necessarily a praxec expert.
      - **`tradeoffs`** — what this shape gives up vs the
        alternatives. "More portable but slower than candidate B."
        "Requires an LLM connection candidate C doesn't."
      - **`verb`** — for `cap.*` shapes, the cap verb from the
        24-cloud. For `flow.*` shapes, omit.
      - **`snippet_inputs` / `snippet_outputs`** — sketch of the
        contract. Names + JSON-schema-shaped types.
      - **`tool_stack`** — which inventory entries this shape
        uses. Cite by name so the operator can verify the
        compose step didn't fabricate tools.
      - **`state_count`** — rough state-machine size for the
        operator's mental load estimate.

      ## Discipline

      - **At least two, at most four** candidates. One is "did the
        compose step actually think"; five is decision paralysis.
        Spec §11 V13 anti-pattern: a forced fanout is worse than
        no fanout.
      - **Make them genuinely different.** Two candidates that
        differ only in slot naming are wasted slots; pick the
        better-named one and propose a structurally different
        alternative. Different verbs, different state shapes,
        different determinism profiles.
      - **Only tools that are in the inventory.** Every entry in a
        candidate's `tool_stack` MUST name a cap, flow, skill, or
        connection that appears in the inventory you were given. The
        inventory IS the reachable-tooling registry — if a connection
        (an MCP binary, a `kind: mcp` server) is not in it, it does not
        exist for this deployment, and you may not put it in a
        candidate. **Never invent a connection name** (e.g. a
        `railway-gate-runner` / `railway-codegen` you imagine would be
        handy). A fabricated connection is not a "new dependency to
        wire" — it is a hallucination that dies at `praxec check` and
        wastes the operator's pick. When the goal seems to need tooling
        that isn't present, say that plainly in `tradeoffs` and shape
        the candidate around what IS reachable.
      - **`requires_new` is for praxec definitions you'd author, not
        connections you'd invent.** The only legitimate `requires_new`
        is a NEW `cap.*` / `skill` the operator would author *inside
        praxec* as part of this work (e.g.
        `requires_new: ["cap.verify.railway-boundary"]`). It is NEVER a
        license to name an external MCP connection or binary that isn't
        in the inventory — that path is closed by the rule above.
      - **Stay run-ambient — do not thread a repo input.** praxec runs
        are ambient over exactly one repository, exposed to every leaf
        as `$.run.repo_root`. Candidates MUST NOT introduce a
        `repository` / `repo` / `repo_path` / `working_dir` input to
        carry a repo or path — that is the pre-run-ambient anti-pattern
        the rest of the pack has moved off. `snippet_inputs` carry the
        task's own domain data, never the repo location.
