# skills/implement.emit-praxec-yaml.yaml
#
# Render a chosen shape into a praxec.repo/v1-conformant YAML body. The
# downstream check-config step verifies the result; this skill
# tells the agent how to produce something that has a chance of
# passing.

skills:
  implement.emit-praxec-yaml:
    verb: implement
    lifecycle: stable
    source: praxec-meta
    body: |
      # Emitting praxec.repo/v1-conformant YAML

      You have a chosen shape. Render it into a YAML body that will
      pass `praxec check`. The downstream verify step will
      catch most authoring slips; your job is to minimise round-trips.

      ## Hard checklist (matches V1-V16 validation cloud)

      ### Both capabilities and orchestrators

      - `version: "1.0.0"` at the top (gateway-config convention),
        UNLESS the file is destined for a `repos:` manifest layout
        directory — in that case omit `version` and `include`
        (load_repo ignores them but they're noise).
      - The top-level block must be `workflows:`.
      - Workflow id must match the tier prefix exactly:
        - Capabilities: `cap.<verb>.<name>` where `<verb>` is one
          of the 24 cap verbs (V1, V2).
        - Orchestrators: `flow.<name>` (V7).
      - Every workflow must declare `initialState` and a `states:`
        map; the initial state must exist in the map.

      ### Capabilities (`cap.*`)

      - `verb:` — one of `triage`, `diagnose`, `plan`, `implement`,
        `review`, `refactor`, `explain`, `compose`, `research`,
        `summarize` (cognitive); `build`, `test`, `deploy`,
        `format`, `lint`, `install`, `verify`, `run`, `inspect`,
        `search`, `fetch`, `audit` (deterministic); `gate`,
        `coordinate` (coordination).
      - `snippet:` block with BOTH `inputs:` AND `outputs:` keys
        (V3, V4). Each entry MUST be a JSON-schema-shaped object
        (V5) — `{ type: ..., ... }`.
      - V6 primary-executor verb-shape: cognitive caps use
        `kind: noop` (with a `skills:` ref) or `kind: mcp`;
        deterministic caps use `kind: script` or `kind: mcp`;
        `gate` caps need at least one initial-state transition with
        `actor: human` OR `purpose: ask`; `coordinate` caps need
        `kind: mcp`.
      - V10: capabilities MAY NOT invoke other workflows via
        `kind: workflow`. They are composition leaves.

      ### Orchestrators / flows (`flow.*`)

      - NO `snippet:` block (V8). NO `verb:` field (V9). Flows are
        entry points, not composable snippets. A nested flow types
        its `use.outputs` from its own top-level `outputs:` block.
      - V11 is RELAXED: a flow MAY invoke another flow via
        `kind: workflow` (multi-flow programs — e.g. a top flow that
        composes derisk / execute-cohort sub-flows). Recursion is
        bounded at runtime by the sub-workflow `max_depth` cap, so
        cyclic nesting fails fast at depth rather than hanging. (V10
        still stands the other way: a `cap.*` may NOT invoke any
        workflow — capabilities are composition leaves.)
      - V12: every `kind: workflow` executor targeting a `cap.*` (or
        nested `flow.*`) id MUST include a `use: { inputs, outputs }`
        binding. `use.inputs` values are `$.scope.path` expressions
        OR literals (a non-`$.` string passes through unchanged — use
        a literal for closed-enum discriminators like a `kind` input).
      - V13/V14: every `use.inputs` path must resolve to a slot
        declared in the flow's `inputs:` block OR written by an
        earlier state's `use.outputs`, and the resolved type must be
        consistent with the target's declared slot type.

      ### `kind: mcp` executors + connection shape

      - The gateway's own MCP surface is exactly TWO stable tools:
        `praxec.query` (read: home / search / describe / get / explain)
        and `praxec.command` (write: start / submit / define). There is
        no `gateway.describe` / `gateway.lexicon.*` tool — those are
        dispatched by present-field shape on the two tools (e.g. a
        lexicon lookup is `praxec.query { subject: "lexicon:<term>" }`;
        a define is `praxec.command { subject: "lexicon:<term>",
        definition: {...} }`).
      - A `kind: mcp` executor names a `connection:` + `tool:` and maps
        arguments with a `map:` block (`map: { targetArg: "$.path" | literal }`),
        NOT an inline `arguments:` block (that key is ignored).
      - Connection definitions use `kind:` (`mcp` | `cli` | `rest`) plus
        `command:` (a string) and/or `url:` — NOT `type:` / `transport:`.
        `deny_unknown_fields` is on, so invented keys (e.g. `external:`)
        fail at load.

      ### Authoring tiers

      - The engine validates exactly TWO authored tiers: capabilities
        (`cap.<verb>.<name>`) and flows (`flow.<name>`). There is no
        third "hop_slot" authoring primitive in the engine today — the
        stack-specialization / `hop_slot` work lives in a resource repo,
        not the core validation cloud. Author caps and flows only.

      ## Discipline

      - **Generate one definition per file.** Don't bundle multiple
        caps or orchestrators in a single YAML body — load_repo
        permits it but it makes review harder.
      - **Inline schemas where small.** A JSON schema fragment
        with a single `type: string` is fine inline; one with
        nested properties is more readable in its own block.
      - **Default to `lifecycle: experimental`** unless the operator
        explicitly asked for stable. Stable lifecycle commits to
        the contract hash; that's a meaningful obligation.
      - **No comments referencing this skill** in the emitted YAML.
        Operator-facing YAML should document its OWN design, not
        the meta-process that produced it.
